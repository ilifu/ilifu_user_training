// Cromwell configuration for SLURM backend on ilifu cluster
// This file tells Cromwell how to submit WDL workflow tasks to SLURM

include required(classpath("application"))

backend {
    default = "SLURM"

    providers {
        SLURM {
            // Use the ConfigBackendLifecycleActorFactory for SLURM
            actor-factory = "cromwell.backend.impl.sfs.config.ConfigBackendLifecycleActorFactory"
            config {
                // Define runtime attributes available in WDL tasks
                runtime-attributes = """
                    Int cpu = 1
                    Int memory_gb = 2
                    String docker = "ubuntu:latest"
                    Int time_hours = 1
                """

                // Command to submit jobs to SLURM with Docker container
                submit-docker = """
                    sbatch \
                        --job-name=${job_name} \
                        --cpus-per-task=${cpu} \
                        --mem=${memory_gb}G \
                        --time=${time_hours}:00:00 \
                        --wrap "docker run --rm \
                            -v ${cwd}:${docker_cwd} \
                            ${docker} \
                            /bin/bash ${script}"
                """

                // Alternative: submit jobs without Docker (direct execution)
                // Uncomment this and comment out submit-docker to use
                submit = """
                    sbatch \
                        --job-name=${job_name} \
                        --cpus-per-task=${cpu} \
                        --mem=${memory_gb}G \
                        --time=${time_hours}:00:00 \
                        --output=${cwd}/cromwell_slurm_%j.log \
                        ${script}
                """

                // How to kill a job
                kill = "scancel ${job_id}"

                // How to check if a job is alive
                check-alive = "squeue -j ${job_id}"

                // Regex to extract job ID from sbatch output
                job-id-regex = "Submitted batch job (\\d+)"

                // Root directory for all task executions
                root = "cromwell-executions"

                // Directory to store temporary files
                glob-link-command = "ln -sf"

                // Number of cores for Cromwell's internal processes
                concurrent-job-limit = 100
            }
        }
    }
}

// Workflow execution options
workflow-options {
    workflow-log-dir = "cromwell-logs"
    workflow-log-temporary = false
}

